name: Documentation feedback
description: Report a typo, broken link, missing step, or confusing public documentation.
title: "[Docs] "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the official 6MM public documentation.

        Do not include credentials, tokens, private keys, customer data, partner-specific terms, or security-sensitive details in public issues.
  - type: input
    id: page
    attributes:
      label: Page or repository URL
      description: Link to the affected documentation page, repository file, or public resource.
      placeholder: https://docs.6mm.com/...
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should be improved?
      description: Describe the typo, broken link, missing detail, outdated wording, or confusing section.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested correction
      description: Optional wording, link, or implementation detail that would make the content clearer.
    validations:
      required: false
